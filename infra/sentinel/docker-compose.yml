version: '3.8'

services:
  redis-master:
    image: redis:7.2-alpine
    container_name: redis-sentinel-master
    ports:
      - "6379:6379"

  redis-replica-1:
    image: redis:7.2-alpine
    container_name: redis-sentinel-replica-1
    ports:
      - "6380:6379"
    command: redis-server --replicaof redis-master 6379
    depends_on:
      - redis-master

  redis-replica-2:
    image: redis:7.2-alpine
    container_name: redis-sentinel-replica-2
    ports:
      - "6381:6379"
    command: redis-server --replicaof redis-master 6379
    depends_on:
      - redis-master

  sentinel-1:
    image: redis:7.2-alpine
    container_name: redis-sentinel-1
    ports:
      - "26379:26379"
    command: [ "sh", "-c", "printf 'port 26379\\nsentinel resolve-hostnames yes\\nsentinel monitor mymaster redis-master 6379 2\\nsentinel down-after-milliseconds mymaster 5000\\nsentinel parallel-syncs mymaster 1\\nsentinel failover-timeout mymaster 10000\\n' > /tmp/sentinel.conf && redis-sentinel /tmp/sentinel.conf" ]
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2

  sentinel-2:
    image: redis:7.2-alpine
    container_name: redis-sentinel-2
    ports:
      - "26380:26379"
    command: [ "sh", "-c", "printf 'port 26379\\nsentinel resolve-hostnames yes\\nsentinel monitor mymaster redis-master 6379 2\\nsentinel down-after-milliseconds mymaster 5000\\nsentinel parallel-syncs mymaster 1\\nsentinel failover-timeout mymaster 10000\\n' > /tmp/sentinel.conf && redis-sentinel /tmp/sentinel.conf" ]
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2

  sentinel-3:
    image: redis:7.2-alpine
    container_name: redis-sentinel-3
    ports:
      - "26381:26379"
    command: [ "sh", "-c", "printf 'port 26379\\nsentinel resolve-hostnames yes\\nsentinel monitor mymaster redis-master 6379 2\\nsentinel down-after-milliseconds mymaster 5000\\nsentinel parallel-syncs mymaster 1\\nsentinel failover-timeout mymaster 10000\\n' > /tmp/sentinel.conf && redis-sentinel /tmp/sentinel.conf" ]
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2
